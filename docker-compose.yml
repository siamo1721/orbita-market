services:
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080

  orders:
    build: ./orders-service
    container_name: orders-service
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
    depends_on:
      - api-gateway

  payments:
    build: ./payments-service
    container_name: payments-service
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
    depends_on:
      - api-gateway
